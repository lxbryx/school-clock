<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawaii Clock</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    font-family: "Montserrat", "Montserrat", sans-serif;
}

.widget {
    width: 300px;
    height: 150px;
    background: linear-gradient(135deg, #ffe4f1, #ffd1ea);
    border-radius: 25px;
    border: 3px solid #ff8fc7;
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.25);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* bow decoration */
.bow {
    position: absolute;
    top: 8px;
    width: 40px;
    height: 20px;
    background: #ff8fc7;
    border-radius: 50%;
    box-shadow: 
        -18px 0 #ffb3d9,
        18px 0 #ffb3d9;
}

/* time text */
.time {
    font-size: 2.6rem;
    font-weight: bold;
    color: #ff4fa3;
    letter-spacing: 2px;
}

/* subtitle */
.sub {
    font-size: 0.9rem;
    color: #ff6fb5;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="widget">
    <div class="bow"></div>
    <div class="time" id="time">00:00</div>
    <div class="sub">♡</div>
</div>

<script>
function updateTime() {
    const now = new Date();

    // add 2 minutes
    now.setMinutes(now.getMinutes() + 2);

    let hours = now.getHours();
    let minutes = now.getMinutes();

    const ampm = hours >= 12 ? "PM" : "AM";
    hours = hours % 12 || 12;

    hours = String(hours).padStart(2, "0");
    minutes = String(minutes).padStart(2, "0");

    document.getElementById("time").textContent =
        `${hours}:${minutes} ${ampm}`;
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
