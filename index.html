<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pink Kawaii Clock</title>
<style>
  body {
    margin: 0;
    background: #ffd6e7;
    font-family: "Arial", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .clock {
    background: #fff0f6;
    border: 3px solid #ff9ecb;
    border-radius: 20px;
    padding: 25px 40px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(255, 150, 200, 0.4);
  }

  .time {
    font-size: 42px;
    color: #ff4fa3;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .label {
    font-size: 14px;
    color: #d94f8a;
    margin-top: 8px;
  }
</style>
</head>

<body>
  <div class="clock">
    <div class="time" id="time">--:--</div>
    <div class="label">♡ My Melody Pink Clock ♡</div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  // Convert to EST (UTC-5 or UTC-4 depending on DST automatically)
  const est = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));

  // Add 2 minutes
  est.setMinutes(est.getMinutes() + 2);

  let hours = est.getHours();
  let minutes = est.getMinutes();

  let ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12;
  hours = hours ? hours : 12;

  minutes = minutes.toString().padStart(2, "0");

  document.getElementById("time").innerText =
    `${hours}:${minutes} ${ampm}`;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
