<!DOCTYPE html>
<html>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<head> 
<meta charset="UTF-8">
<title>time</title>
<style>
  body {
    margin: 0;
    background: transparent;
    font-family: "Quicksand", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .clock {
    background: #fff0f6;
    border: 3px solid #ff9ecb;
    font-family: "Quicksand", sans-serif;
    border-radius: 20px;
    padding: 25px 40px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(255, 150, 200, 0.4);
  }

  .time {
    font-size: 120px;
    color: #ff4fa3;
    font-weight: bold;
    letter-spacing: 2px;
    font-family: "Quicksand", sans-serif;
  }

  #date {
  font-size: 45px;
  color: #d94f8a;
  font-weight: bold;
  margin-top: 8px;
  font-family: "Quicksand", sans-serif;
  }

  .label {
    font-size: 14px;
    color: #d94f8a;
    margin-top: 8px;
    font-family: "Quicksand", sans-serif;
  }
</style>
</head>

<body>
  <div class="clock">
    <div class="time" id="time">--:--</div>
    <div id="date"></div>
    <div class="label">♡</div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  // Convert to EST
  const est = new Date(
    now.toLocaleString("en-US", { timeZone: "America/New_York" })
  );

  // Add 2 minutes
  est.setMinutes(est.getMinutes() + 3);

  // TIME
  let hours = est.getHours();
  let minutes = est.getMinutes();

  let ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12;
  hours = hours ? hours : 12;

  minutes = minutes.toString().padStart(2, "0");

  document.getElementById("time").innerText =
    `${hours}:${minutes} ${ampm}`;

  // DATE ✨ ADD THIS PART
  const options = {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric"
  };

  const dateString = est.toLocaleDateString("en-US", options);

  document.getElementById("date").innerText = dateString;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
